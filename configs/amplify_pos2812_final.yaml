  - name: "pos_2812_teachable"
    path: "runs/novel/Teachable/pos_2812/layer=bn2/concept_vector.npy"
    layer: "bn2"

alpha_range: [-0.2, -0.1, 0.0, 0.1, 0.2, 0.3]
n_sims: 100
beta: 0.01
max_positions: 50

evaluation_dataset:
  path: "data/STS_concept_eval.jsonl"
